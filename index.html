<style>
/* Douglas & Talita Haggist's X3 — faithful V3ME-style UI */
:root{
  --bg:#0b0d0f; --sidebar:#000; --panel:#14181b; --panel2:#1b2024; --card:#151a1e;
  --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.06);
  --txt:#f2f5f7; --muted:#8b949e; --muted2:#6b7480;
  --teal:#5fd0b5; --teal-d:#3fb99c; --teal-ink:#04231c;
  --red:#f0616d; --amber:#f0b429; --blue:#7aa2ff; --purple:#9b8cff;
  --r:14px; --shadow:0 8px 30px rgba(0,0,0,.45);
  --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
  --sidebar-w:264px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  overscroll-behavior-y:none;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
h1,h2,h3{margin:0}
.muted{color:var(--muted)}
.hidden{display:none!important}

/* ---------- App shell ---------- */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--sidebar);border-right:1px solid var(--line);
  position:fixed;top:0;left:0;bottom:0;z-index:60;display:flex;flex-direction:column;
  padding:calc(20px + var(--safe-t)) 0 20px;transition:transform .25s ease}
.brand{font-weight:800;letter-spacing:1px;font-size:26px;padding:0 22px 22px}

<script>
// V3ME Cloud — data layer backed by Supabase (Postgres + Auth + RLS).
// Same shape the app expects, but async and scoped to the logged-in user.
const Supa = (() => {
  // Effective config: a locally-saved config (first-run setup) overrides the baked config.js.
  const CFG_KEY = 'v3me_cfg';
  function readCfg(){
    try { const s = JSON.parse(localStorage.getItem(CFG_KEY) || 'null'); if (s && s.SUPABASE_URL) return s; } catch(e){}
    return window.V3ME_CONFIG || {};
  }
  const cfg = readCfg();
  const isPlaceholder = v => !v || String(v).indexOf('__') === 0;
  const configured = !isPlaceholder(cfg.SUPABASE_URL) && !isPlaceholder(cfg.SUPABASE_ANON_KEY);
  function saveConfig(url, key){
    localStorage.setItem(CFG_KEY, JSON.stringify({ SUPABASE_URL: url.trim().replace(/\/+$/,''), SUPABASE_ANON_KEY: key.trim() }));
    location.reload();
  }
  const client = configured ? window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
  }) : null;
  let _uid = null;

  // ---- auth ----
  const onAuth = (cb) => client.auth.onAuthStateChange((_e, s) => { _uid = s?.user?.id || null; cb(s?.user || null); });
  async function currentUser(){ const { data } = await client.auth.getUser(); _uid = data?.user?.id || null; return data?.user || null; }
  const signUp = (email, password) => client.auth.signUp({ email, password });
  const signIn = (email, password) => client.auth.signInWithPassword({ email, password });
  const signOut = () => client.auth.signOut();
  const resetPassword = (email) => client.auth.resetPasswordForEmail(email);

  // ---- row <-> app object mappers ----
  const M = {
    bands: {
      toRow: b => ({ id:b.id, user_id:_uid, name:b.name, brand:b.brand, color:b.color, description:b.description,
        min_kg:b.minKg, max_kg:b.maxKg, key:b.key, ord:b.order||0 }),
      fromRow: r => ({ id:r.id, name:r.name, brand:r.brand, color:r.color, description:r.description,
        minKg:r.min_kg, maxKg:r.max_kg, key:r.key, order:r.ord||0 })
    },
    movements: {
      toRow: m => ({ id:m.id, user_id:_uid, name:m.name, resistance_type:m.resistanceType||'band',
        band_doubled:!!m.bandDoubled, track_reps:m.trackReps!==false, track_partial_reps:m.trackPartialReps!==false,
        track_resistance:m.trackResistance!==false, track_duration:!!m.trackDuration, description:m.description, ord:m.order||0 }),
      fromRow: r => ({ id:r.id, name:r.name, resistanceType:r.resistance_type, bandDoubled:r.band_doubled,
        trackReps:r.track_reps, trackPartialReps:r.track_partial_reps, trackResistance:r.track_resistance,
        trackDuration:r.track_duration, description:r.description, order:r.ord||0 })
    },
    templates: {
      toRow: t => ({ id:t.id, user_id:_uid, name:t.name, items:t.items||[] }),
      fromRow: r => ({ id:r.id, name:r.name, items:r.items||[] })
    },
    workouts: {
      toRow: w => ({ id:w.id, user_id:_uid, date:w.date, duration_sec:w.durationSec||0, notes:w.notes,
        auto_saved:!!w.autoSaved, rest_timers:w.restTimers||[], exercises:w.exercises||[] }),
      fromRow: r => ({ id:r.id, date:r.date, durationSec:r.duration_sec, notes:r.notes, autoSaved:r.auto_saved,
        restTimers:r.rest_timers||[], exercises:r.exercises||[] })
    }
  };
  const isUuid = s => typeof s==='string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);

  // ---- reads ----
  async function loadAll(){
    const [b,m,t,w,p] = await Promise.all([
      client.from('bands').select('*').order('ord',{ascending:true}),
      client.from('movements').select('*').order('ord',{ascending:true}),
      client.from('templates').select('*'),
      client.from('workouts').select('*').order('date',{ascending:false}),
      client.from('profiles').select('*').maybeSingle()
    ]);
    for(const r of [b,m,t,w]) if(r.error) throw r.error;
    return {
      bands: (b.data||[]).map(M.bands.fromRow),
      movements: (m.data||[]).map(M.movements.fromRow),
      templates: (t.data||[]).map(M.templates.fromRow),
      workouts: (w.data||[]).map(M.workouts.fromRow),
      prefs: (p.data && p.data.prefs) || {}
    };
  }

  // ---- writes ----
  async function put(store, obj){
    const row = M[store].toRow(obj);
    if(!isUuid(row.id)) delete row.id; // let DB generate
    const { data, error } = await client.from(store).upsert(row).select().single();
    if(error) throw error;
    return M[store].fromRow(data);
  }
  async function del(store, id){ const { error } = await client.from(store).delete().eq('id', id); if(error) throw error; }

  // ---- prefs (units, plan) stored in profiles.prefs ----
  async function getPrefs(){ const { data } = await client.from('profiles').select('prefs').maybeSingle(); return (data&&data.prefs)||{}; }
  async function setPref(key, value){
    const prefs = await getPrefs(); prefs[key]=value;
    const { error } = await client.from('profiles').update({ prefs }).eq('id', _uid);
    if(error) throw error; return prefs;
  }

  // ---- import a v3me export bundle into this account ----
  async function importBundle(bundle, { replace=false } = {}){
    const counts = {};
    if(replace){ for(const s of ['workouts','templates','movements','bands']) await client.from(s).delete().eq('user_id', _uid); }
    for(const store of ['bands','movements','templates','workouts']){
      const items = (bundle[store]||[]).map(M[store].toRow).map(r=>{ if(!isUuid(r.id)) delete r.id; return r; });
      counts[store]=0;
      for(let i=0;i<items.length;i+=500){
        const chunk = items.slice(i,i+500);
        const { error } = await client.from(store).upsert(chunk);
        if(error) throw error; counts[store]+=chunk.length;
      }
    }
    if(bundle.settings){ const prefs=await getPrefs(); Object.assign(prefs, { units:bundle.settings.units||prefs.units||'lb' });
      await client.from('profiles').update({ prefs }).eq('id',_uid); }
    return counts;
  }

  function exportBundle(state){
    return { app:'V3ME-Cloud', schema:1, exportedAt:new Date().toISOString(), source:'v3me-cloud',
      settings:{ units: state.units }, bands:state.bands, movements:state.movements,
      templates:state.templates, workouts:state.workouts };
  }

  return { client, configured, saveConfig, onAuth, currentUser, signUp, signIn, signOut, resetPassword,
    loadAll, put, del, getPrefs, setPref, importBundle, exportBundle };
})();

</script>
<script>
// V3ME Local — tiny dependency-free SVG charts (works fully offline).
const Charts = (() => {
  const TEAL = '#2dd4bf', GRID = 'rgba(255,255,255,0.07)', TXT = 'rgba(255,255,255,0.55)';
  const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

  // Bar chart. data = [{label, value}], opts {height, unit, color}
  function bar(data, opts = {}) {
    const W = 640, H = opts.height || 220, padL = 40, padB = 26, padT = 12, padR = 8;
    const iw = W - padL - padR, ih = H - padT - padB;
    const max = Math.max(1, ...data.map(d => d.value));
    const bw = iw / Math.max(1, data.length);
    const color = opts.color || TEAL;
    let bars = '', labels = '';
    const step = Math.ceil(data.length / 12);
    data.forEach((d, i) => {
      const h = (d.value / max) * ih;
      const x = padL + i * bw + bw * 0.12;
      const y = padT + ih - h;
      bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(bw*0.76).toFixed(1)}" height="${Math.max(0,h).toFixed(1)}" rx="2" fill="${color}"><title>${esc(d.label)}: ${d.value}${opts.unit||''}</title></rect>`;
      if (i % step === 0) labels += `<text x="${(padL+i*bw+bw/2).toFixed(1)}" y="${H-8}" fill="${TXT}" font-size="10" text-anchor="middle">${esc(d.label)}</text>`;
    });
    let grid = '';
    for (let g = 0; g <= 4; g++) {
      const y = padT + (ih/4)*g; const v = Math.round(max - (max/4)*g);
      grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="${GRID}"/>`;
      grid += `<text x="${padL-6}" y="${(y+3).toFixed(1)}" fill="${TXT}" font-size="10" text-anchor="end">${v}</text>`;
    }
    return `<svg viewBox="0 0 ${W} ${H}" class="chart" preserveAspectRatio="xMidYMid meet">${grid}${bars}${labels}</svg>`;
  }

  // Line chart. data = [{label, value}]
  function line(data, opts = {}) {
    const W = 640, H = opts.height || 220, padL = 40, padB = 26, padT = 12, padR = 8;
    const iw = W - padL - padR, ih = H - padT - padB;
    if (!data.length) return '<div class="muted">No data</div>';
    const vals = data.map(d => d.value);
    const max = Math.max(...vals), min = Math.min(...vals);
    const range = (max - min) || 1;
    const color = opts.color || TEAL;
    const X = i => padL + (iw) * (data.length === 1 ? 0.5 : i / (data.length - 1));
    const Y = v => padT + ih - ((v - min) / range) * ih;
    let pts = data.map((d, i) => `${X(i).toFixed(1)},${Y(d.value).toFixed(1)}`).join(' ');
    let area = `${padL},${padT+ih} ${pts} ${(padL+iw).toFixed(1)},${padT+ih}`;
    let dots = data.map((d,i) => `<circle cx="${X(i).toFixed(1)}" cy="${Y(d.value).toFixed(1)}" r="2.4" fill="${color}"><title>${esc(d.label)}: ${d.value}${opts.unit||''}</title></circle>`).join('');
    let grid = '';
    for (let g = 0; g <= 4; g++) {
      const y = padT + (ih/4)*g; const v = (max - (range/4)*g);
      grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="${GRID}"/>`;
      grid += `<text x="${padL-6}" y="${(y+3).toFixed(1)}" fill="${TXT}" font-size="10" text-anchor="end">${Math.round(v)}</text>`;
    }
    const step = Math.ceil(data.length / 8);
    let labels = data.map((d,i)=> i%step===0 ? `<text x="${X(i).toFixed(1)}" y="${H-8}" fill="${TXT}" font-size="10" text-anchor="middle">${esc(d.label)}</text>`:'').join('');
    return `<svg viewBox="0 0 ${W} ${H}" class="chart" preserveAspectRatio="xMidYMid meet">${grid}
      <polygon points="${area}" fill="${color}" opacity="0.12"/>
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/>${dots}${labels}</svg>`;
  }

  // Heatmap of activity by day (GitHub-style), weeks x 7. days = Map(dateStr -> count)
  function heat(byDate, opts = {}) {
    const weeks = opts.weeks || 26;
    const cell = 13, gap = 3, W = weeks * (cell + gap) + 30, H = 7 * (cell + gap) + 20;
    const today = new Date(); today.setHours(0,0,0,0);
    const start = new Date(today); start.setDate(start.getDate() - (weeks*7 - 1));
    // align start to Sunday
    start.setDate(start.getDate() - start.getDay());
    let rects = '';
    let max = 0; byDate.forEach(v => { if (v>max) max=v; });
    const shade = v => v === 0 ? 'rgba(255,255,255,0.05)'
      : `rgba(45,212,191,${(0.25 + 0.75 * Math.min(1, v / Math.max(1,max))).toFixed(2)})`;
    for (let w = 0; w < weeks; w++) {
      for (let d = 0; d < 7; d++) {
        const cur = new Date(start); cur.setDate(start.getDate() + w*7 + d);
        if (cur > today) continue;
        const key = cur.toISOString().slice(0,10);
        const v = byDate.get(key) || 0;
        const x = 24 + w*(cell+gap), y = 4 + d*(cell+gap);
        rects += `<rect x="${x}" y="${y}" width="${cell}" height="${cell}" rx="2.5" fill="${shade(v)}"><title>${key}: ${v} workout(s)</title></rect>`;
      }
    }
    const dow = ['','Mon','','Wed','','Fri',''];
    let labels = dow.map((t,i)=> t?`<text x="18" y="${4+i*(cell+gap)+cell-2}" fill="${TXT}" font-size="9" text-anchor="end">${t}</text>`:'').join('');
    return `<svg viewBox="0 0 ${W} ${H}" class="chart heat" preserveAspectRatio="xMidYMid meet">${labels}${rects}</svg>`;
  }

  return { bar, line, heat };
})();

// dual-series bar (Repetitions + Max Force) for analytics — appended for the clone
Charts.dualBar = function(data, opts={}){
  const W=680,H=300,padL=40,padB=30,padT=12,padR=10, iw=W-padL-padR, ih=H-padT-padB;
  const aKey=opts.aKey||'reps', bKey=opts.bKey||'force';
  const max=Math.max(1,...data.map(d=>Math.max(d[aKey]||0,d[bKey]||0)));
  const n=data.length, group=iw/Math.max(1,n), bw=Math.min(14, group*0.38);
  const aC=opts.aColor||'#7aa2ff', bC=opts.bColor||'#9b8cff';
  let bars='',labels=''; const step=Math.ceil(n/10);
  data.forEach((d,i)=>{ const x=padL+i*group+group/2;
    const ha=((d[aKey]||0)/max)*ih, hb=((d[bKey]||0)/max)*ih;
    bars+=`<rect x="${(x-bw-1).toFixed(1)}" y="${(padT+ih-ha).toFixed(1)}" width="${bw}" height="${Math.max(0,ha).toFixed(1)}" rx="2" fill="${aC}"><title>${d.label}: ${d[aKey]} reps</title></rect>`;
    bars+=`<rect x="${(x+1).toFixed(1)}" y="${(padT+ih-hb).toFixed(1)}" width="${bw}" height="${Math.max(0,hb).toFixed(1)}" rx="2" fill="${bC}"><title>${d.label}: ${d[bKey]}</title></rect>`;
    if(i%step===0) labels+=`<text x="${x.toFixed(1)}" y="${H-10}" fill="rgba(255,255,255,.5)" font-size="10" text-anchor="middle">${d.label}</text>`;
  });
  let grid=''; for(let g=0;g<=4;g++){ const y=padT+(ih/4)*g,v=Math.round(max-(max/4)*g);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="rgba(255,255,255,.07)"/>`;
    grid+=`<text x="${padL-6}" y="${(y+3).toFixed(1)}" fill="rgba(255,255,255,.5)" font-size="10" text-anchor="end">${v}</text>`; }
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" preserveAspectRatio="xMidYMid meet">${grid}${bars}${labels}</svg>`;
};

</script>
<script>
// Douglas & Talita Haggist's X3 — faithful V3ME-style client. Supabase-backed, per-user sync.
const App = (() => {
  const $ = (s,r=document)=>r.querySelector(s);
  let state = { user:null, units:'lb', prefs:{}, bands:[], movements:[], templates:[], workouts:[], session:null, route:'workouts', chrome:false, analytics:{range:'1M', anchor:new Date(), movementId:'', chart:'bar'} };

  // ---------- helpers ----------
  const KG2LB=2.2046226218;
  const toDisp=kg=> state.units==='kg'?kg:kg*KG2LB;
  const uName=()=>state.units;
  const round=(n,d=0)=>{const p=10**d;return Math.round(n*p)/p;};
  const uuid=()=> crypto.randomUUID? crypto.randomUUID(): 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==='x'?r:(r&0x3|0x8)).toString(16);});
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  function fmtDur(sec){ sec=Math.max(0,Math.round(sec||0)); const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60; return (h?h+':':'')+String(m).padStart(h?2:1,'0')+':'+String(s).padStart(2,'0'); }
  function fmtClock(sec){ return fmtDur(sec); }
  const DAY=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d=dt=>new Date(dt);
  function fmtDate(dt){ const x=d(dt); return `${DAY[x.getDay()]} ${MON[x.getMonth()]} ${x.getDate()}, ${x.getFullYear()}`; }
  function fmtShort(dt){ const x=d(dt); return `${MON[x.getMonth()]} ${x.getDate()}`; }
  function toLocalInput(dt){ const x=d(dt); const p=n=>String(n).padStart(2,'0'); return `${x.getFullYear()}-${p(x.getMonth()+1)}-${p(x.getDate())}T${p(x.getHours())}:${p(x.getMinutes())}`; }
  const bandById=id=> state.bands.find(b=>b.id===id);
  const movById=id=> state.movements.find(m=>m.id===id);
  const movName=id=>(movById(id)||{}).name||'Movement';
  function bandLabel(b){ if(!b) return '—'; return `${b.brand&&b.brand!=='Unknown'?b.brand:'Unknown'} / ${b.name}`; }
  function bandsLabel(ex){ const ids=ex.bandIds||[]; if(!ids.length) return 'No Band Selected';
    const mov=movById(ex.movementId); const dbl=mov&&mov.bandDoubled;
    return ids.map(id=>{ const b=bandById(id); return b? (bandLabel(b)+(dbl?' Doubled':'')) : 'Unknown'; }).join(', '); }
  function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2400); }
  const openSheet=html=>{ $('#sheetBody').innerHTML=html; $('#sheetBg').classList.add('open'); $('#sheet').classList.add('open'); };
  const closeSheet=()=>{ $('#sheetBg').classList.remove('open'); $('#sheet').classList.remove('open'); };
  $('#sheetBg').addEventListener('click', closeSheet);
  // band avg resistance for max-force proxy (kg)
  function bandMaxKg(ex){ const ids=ex.bandIds||[]; if(!ids.length) return 0; let s=0; ids.forEach(id=>{const b=bandById(id); if(b) s+=b.maxKg||0;}); const mov=movById(ex.movementId); if(mov&&mov.bandDoubled) s*=2; return s; }

  // prefs/session
  const plan=()=> state.prefs.plan||{days:[1,3,5],reminder:null,templateByDay:{}};
  async function savePref(k,v){ state.prefs[k]=v; try{ await Supa.setPref(k,v);}catch(e){} }
  const sessKey='dtx3_session';
  const loadSession=()=>{ try{return JSON.parse(localStorage.getItem(sessKey)||'null');}catch(e){return null;} };
  const saveSession=s=>{ try{ s?localStorage.setItem(sessKey,JSON.stringify(s)):localStorage.removeItem(sessKey);}catch(e){} };

  // ---------- boot / auth ----------
  async function boot(){
    if(!Supa.configured){ showSetup(); return; }
    Supa.onAuth(async u=>{ state.user=u; if(u){ await enterApp(); } else { state.chrome=false; showAuth(); } });
    const u=await Supa.currentUser(); state.user=u;
    if(u) await enterApp(); else showAuth();
    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
    setInterval(tick,1000);
  }
  function showSetup(){ $('#root').innerHTML=`<div class="auth-wrap"><div class="auth-logo">Haggist <b>X3</b></div>
    <div class="auth-sub">One-time setup — connect Supabase.</div><div class="card">
    <label class="field"><span class="lab">Supabase Project URL</span><input id="cfg_url" placeholder="https://xxxx.supabase.co"></label>
    <label class="field"><span class="lab">Anon / publishable key</span><input id="cfg_key"></label>
    <div id="cfg_msg" class="auth-msg"></div>
    <button class="btn block" style="margin-top:8px" onclick="App.saveSetup()">Connect</button></div></div>`; }
  function saveSetup(){ const url=($('#cfg_url').value||'').trim(),key=($('#cfg_key').value||'').trim(),el=$('#cfg_msg');
    if(!/^https:\/\/.+\.supabase\.co/.test(url)){el.className='auth-msg err';el.textContent='Enter a valid Supabase URL.';return;}
    if(key.length<20){el.className='auth-msg err';el.textContent='Key looks too short.';return;} Supa.saveConfig(url,key); }

  function showAuth(mode='login'){
    $('#root').innerHTML=`<div class="auth-wrap">
      <div class="auth-logo">Douglas &amp; Talita <b>X3</b></div>
      <div class="auth-sub">Your training, synced privately across your devices.</div>
      <div class="card">
        <div class="auth-tabs"><button class="${mode==='login'?'active':''}" onclick="App.authMode('login')">Log in</button>
          <button class="${mode==='signup'?'active':''}" onclick="App.authMode('signup')">Sign up</button></div>
        <label class="field"><span class="lab">Email</span><input id="a_email" type="email" autocomplete="email"></label>
        <label class="field"><span class="lab">Password</span><input id="a_pw" type="password" autocomplete="${mode==='signup'?'new-password':'current-password'}"></label>
        <div id="a_msg" class="auth-msg"></div>
        <button class="btn block" id="a_btn" style="margin-top:8px" onclick="App.authSubmit('${mode}')">${mode==='signup'?'Create account':'Log in'}</button>
        ${mode==='login'?`<div style="text-align:center;margin-top:14px"><span class="link" onclick="App.forgot()">Forgot password?</span></div>`:''}
      </div></div>`;
    const pw=$('#a_pw'); if(pw) pw.addEventListener('keydown',e=>{ if(e.key==='Enter') App.authSubmit(mode); });
  }
  function authMode(m){ showAuth(m); }
  function amsg(t,x){ const el=$('#a_msg'); if(el){el.className='auth-msg '+t;el.textContent=x;} }
  async function authSubmit(mode){ const email=($('#a_email').value||'').trim(),pw=$('#a_pw').value||'';
    if(!email||!pw){amsg('err','Enter email and password.');return;}
    if(mode==='signup'&&pw.length<6){amsg('err','Password must be 6+ characters.');return;}
    const b=$('#a_btn'); b.disabled=true; b.innerHTML='<span class="spin"></span>';
    try{ if(mode==='signup'){ const {data,error}=await Supa.signUp(email,pw); if(error)throw error; if(data.user&&!data.session){ amsg('ok','Account created — you can log in now.'); b.disabled=false; b.textContent='Create account'; return; } }
      else { const {error}=await Supa.signIn(email,pw); if(error)throw error; } }
    catch(e){ amsg('err',e.message||'Error'); b.disabled=false; b.textContent=mode==='signup'?'Create account':'Log in'; }
  }
  async function forgot(){ const email=($('#a_email').value||'').trim(); if(!email){amsg('err','Enter your email first.');return;} try{await Supa.resetPassword(email); amsg('ok','Reset link sent.');}catch(e){amsg('err',e.message);} }

  // ---------- chrome / layout ----------
  const NAV=[
    {sec:'TOOLS'}, {r:'analytics',ic:'📈',t:'Analytics'},
    {sec:'LOGS'}, {r:'workouts',ic:'⚡',t:'Workouts'},
    {sec:'MANAGE'}, {r:'bands',ic:'🎗️',t:'Bands'}, {r:'movements',ic:'🏋️',t:'Movements'}, {r:'templates',ic:'📋',t:'Templates'},
  ];
  function buildChrome(){
    $('#root').innerHTML=`
    <div class="app">
      <div class="scrim" id="scrim" onclick="App.menu(false)"></div>
      <aside class="sidebar" id="sidebar">
        <div class="brand">Douglas &amp; Talita <b>X3</b><small>HAGGIST</small></div>
        <div id="navList"></div>
        <div class="spacer"></div>
        <div class="userbox"><span class="av" id="uav"></span><span class="grow" id="uemail" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
          <span class="iconbtn" style="width:32px;height:32px" title="Account" onclick="App.account()">⚙︎</span></div>
      </aside>
      <div class="content">
        <div class="topbar"><button class="burger" onclick="App.menu(true)">☰</button>
          <div class="tb-title">Douglas &amp; Talita <b>X3</b></div></div>
        <div class="main" id="view"></div>
      </div>
    </div>`;
    renderNav();
    document.addEventListener('click', e=>{ const a=e.target.closest('[data-route]'); if(a){ e.preventDefault(); go(a.dataset.route); } });
    state.chrome=true;
  }
  function renderNav(){ $('#navList').innerHTML = NAV.map(n=> n.sec? `<div class="nav-sec">${n.sec}</div>`
    : `<div class="nav-item ${state.route===n.r?'active':''}" data-route="${n.r}"><span class="ic">${n.ic}</span>${n.t}</div>`).join(''); }
  function menu(open){ $('#sidebar').classList.toggle('open',open); $('#scrim').classList.toggle('open',open); }

  async function enterApp(){
    if(!state.chrome) buildChrome();
    const em=state.user?.email||''; $('#uemail').textContent=em; $('#uav').textContent=(em[0]||'?').toUpperCase();
    state.session=loadSession();
    $('#view').innerHTML=`<div class="empty" style="padding-top:60px"><span class="spin"></span><div class="muted" style="margin-top:10px">Loading your training…</div></div>`;
    await loadData();
    if(location.hash) state.route=location.hash.slice(1)||'workouts';
    render();
  }
  async function loadData(){ try{ const dta=await Supa.loadAll();
      state.bands=dta.bands; state.movements=dta.movements; state.templates=dta.templates; state.workouts=dta.workouts;
      state.prefs=dta.prefs||{}; state.units=state.prefs.units||'lb';
    }catch(e){ toast('Load error: '+(e.message||e)); } }
  const refresh=loadData;

  function go(r){ state.route=r; location.hash=r; menu(false); if(state.chrome) renderNav(); render(); window.scrollTo(0,0); }
  window.addEventListener('hashchange',()=>{ const r=location.hash.slice(1); if(r&&r!==state.route&&state.chrome){ state.route=r; renderNav(); render(); } });
  const view=()=>$('#view');
  function render(){ if(!state.chrome) return;
    ({workouts:renderWorkouts, analytics:renderAnalytics, bands:renderBands, movements:renderMovements, templates:renderTemplates}[state.route]||renderWorkouts)(); }

  // ---------- WORKOUTS list (faithful) ----------
  function repsHtml(ex){ const f=ex.reps==null?0:ex.reps, p=ex.partialReps==null?0:ex.partialReps; return `<span class="ex-reps"><b>${f}</b><span class="part">+${p}</span></span>`; }
  function exerciseRowHtml(ex){
    const mov=movById(ex.movementId); const adv=ex.advanced?'<span class="badge-adv">ADV</span>':'';
    const timer=ex.durationSec?`<span class="ex-timer">⏱ ${fmtDur(ex.durationSec)}</span>`:'';
    return `<div class="ex-row">
      <div class="ex-top"><div><div class="ex-name">${esc(mov?mov.name:'Movement')} ${adv}</div></div>
        <div class="ex-metric">${timer}${repsHtml(ex)}</div></div>

      ${ex.notes?`<div class="ex-note">${esc(ex.notes)}</div>`:''}</div>`;
  }
  function workoutCardHtml(w){
    const tpl=w.templateName|| (w.exercises&&w.exercises._tpl) || '';
    const totalReps=(w.exercises||[]).reduce((a,e)=>a+((e.reps||0)+(e.partialReps||0)),0);
    return `<div class="wcard">
      <div class="wcard-head"><div><div class="date">${fmtDate(w.date)}</div>

        <div class="acts">

        </div></div>
      ${tpl?`<div class="tpl-band">${esc(tpl)}</div>`:''}
      ${(w.exercises&&w.exercises.length)? w.exercises.map(exerciseRowHtml).join(''):'<div class="ex-row"><div class="muted" style="text-align:center">No Exercises Logged</div></div>'}
      ${w.exercises&&w.exercises.length?`<div class="wcard-foot"><span>Total reps</span><span>${totalReps}</span></div>`:''}
    </div>`;
  }
  function renderWorkouts(){
    const groups={}; state.workouts.forEach(w=>{ const x=d(w.date); const k=`${MON[x.getMonth()]} ${x.getFullYear()}`; (groups[k]=groups[k]||[]).push(w); });
    view().innerHTML=`
      <div class="page-head"><h1>Workouts</h1><button class="btn right" onclick="App.startSession()">+ Add</button></div>
      ${state.prefs.homePhoto?`<div class="hero has-photo" style="background-image:linear-gradient(rgba(0,0,0,.05),rgba(6,10,12,.4)),url('${state.prefs.homePhoto}')"><button class="hero-cam" onclick="App.pickHomePhoto()">📷</button><div class="hero-ov"><div class="muted" style="font-size:12px">${state.workouts.length} workouts · ${round(state.workouts.reduce((a,w)=>a+(w.durationSec||0),0)/3600)} h</div></div></div>`:''}
      ${state.workouts.length? Object.entries(groups).map(([k,ws])=>`<div class="month-h">${k} · ${ws.length}</div>${ws.map(workoutCardHtml).join('')}`).join('')
        : `<div class="empty"><div class="big">⚡</div>No workouts yet<div class="muted" style="margin-top:6px">Tap Add to log one, or import your history from ⚙︎.</div></div>`}`;
  }

  // ---------- LIVE SESSION / EDIT ----------
  function newExercise(movementId){ const mov=movById(movementId); return { id:uuid(), movementId, bandIds:[], reps:null, partialReps:null, durationSec:null, advanced:!!(mov&&mov.trackPartialReps), notes:null, weight:null, rank:0 }; }
  function startSession(templateId){
    let exercises=[]; let templateName='';
    if(templateId){ const t=state.templates.find(x=>x.id===templateId); if(t){ templateName=t.name; exercises=(t.items||[]).slice().sort((a,b)=>(a.rank||0)-(b.rank||0)).map((it,i)=>{const e=newExercise(it.movementId); e.rank=i+1; return e;}); } }
    state.session={ id:uuid(), startedAt:Date.now(), workoutAt:new Date().toISOString(), durationSec:0, running:true, templateName, notes:null, exercises };
    saveSession(state.session); openWorkoutEditor();
  }
  function openWorkout(id){ const w=state.workouts.find(x=>x.id===id); if(!w) return;
    state.session={ id:w.id, existing:true, startedAt:Date.now()-(w.durationSec||0)*1000, workoutAt:w.date, durationSec:w.durationSec||0, running:false, templateName:w.templateName||'', notes:w.notes, exercises:(w.exercises||[]).map(e=>({...e, id:e.id||uuid(), bandIds:(e.bandIds||[]).slice()})) };
    openWorkoutEditor();
  }
  function sessionElapsed(){ const s=state.session; if(!s) return 0; return s.running? Math.round((Date.now()-s.startedAt)/1000) : (s.durationSec||0); }
  function openWorkoutEditor(){
    const s=state.session;
    openSheet(`
      <div class="sheet-head"><h2>${s.existing?'Edit Workout':'Workout'}</h2><button class="x" onclick="App.closeEditor()">✕</button></div>
      <div class="card" style="margin-bottom:12px"><div class="row">
        <div><div class="muted" style="font-size:11px;letter-spacing:.5px">TIMER</div><div class="timer-lg ${s.running?'pulse':''}" id="editTimer">${fmtClock(sessionElapsed())}</div></div>
        <div class="right row">
          ${s.running?`<button class="iconbtn tealon" title="Pause" onclick="App.toggleTimer()">⏸</button>`:`<button class="iconbtn" title="Start" onclick="App.toggleTimer()">▶</button>`}
          <button class="iconbtn" title="Edit time" onclick="App.editTime()">✎</button>
        </div></div>
        <label class="field" style="margin:10px 0 0"><span class="lab">Date &amp; time</span><input type="datetime-local" id="s_date" value="${toLocalInput(s.workoutAt)}" onchange="App.setWorkoutDate(this.value)"></label>
        ${s.templateName?`<div style="margin-top:8px"><span class="muted" style="font-size:11px;letter-spacing:.5px">TEMPLATE</span> <b>${esc(s.templateName)}</b></div>`:''}
      </div>
      <div class="row" style="margin:4px 2px 8px"><span class="muted" style="font-size:11px;letter-spacing:1px">WORKOUT ITEMS</span></div>
      <div id="exList"></div>
      <button class="btn ghost block" style="margin-top:6px" onclick="App.pickExercise()">+ Add Exercise</button>
      <label class="field"><span class="lab">Workout notes</span><textarea id="s_notes" oninput="App.setWorkoutNotes(this.value)">${esc(s.notes||'')}</textarea></label>
      <div class="row" style="margin-top:8px">
        <button class="btn red" onclick="App.deleteSession()">${s.existing?'Delete':'Cancel'}</button>
        <button class="btn right" id="saveSess" onclick="App.finishSession()">${s.existing?'Save':'Finish'}</button>
      </div>`);
    renderExList();
  }
  function renderExList(){ const s=state.session; const el=$('#exList'); if(!el)return;
    el.innerHTML = (s.exercises||[]).map((ex,i)=>{
      const mov=movById(ex.movementId); const adv=ex.advanced?'<span class="badge-adv">ADV</span>':'';
      const timer=ex.durationSec?`<span class="ex-timer">⏱ ${fmtDur(ex.durationSec)}</span>`:'';
      const prev=lastPerf(ex.movementId, s.id);
      return `<div class="wcard" style="margin-bottom:10px;cursor:pointer" onclick="App.editExercise(${i})">
        <div class="ex-row" style="border:none">
          <div class="ex-top"><div><div class="ex-name">${esc(mov?mov.name:'Movement')} ${adv}</div></div>
            <div class="ex-metric">${timer}${repsHtml(ex)}${prev?`<span class="muted" style="font-size:12px">Prev: ${prev.reps} +${prev.partialReps}</span>`:''}</div></div>
          <div class="ex-band">${esc(bandsLabel(ex))}</div></div></div>`;
    }).join('') || '<div class="muted" style="text-align:center;padding:14px">No exercises yet</div>';
  }
  function lastPerf(movementId, excludeWorkoutId){
    for(const w of state.workouts){ if(w.id===excludeWorkoutId) continue;
      const e=(w.exercises||[]).find(x=>x.movementId===movementId); if(e&&(e.reps!=null)) return e; }
    return null;
  }
  function tick(){ const el=$('#editTimer'); if(el&&state.session&&state.session.running) el.textContent=fmtClock(sessionElapsed()); }
  function toggleTimer(){ const s=state.session; if(s.running){ s.durationSec=sessionElapsed(); s.running=false; } else { s.startedAt=Date.now()-(s.durationSec||0)*1000; s.running=true; } saveSession(s); openWorkoutEditor(); }
  function editTime(){ const s=state.session; const cur=Math.round(sessionElapsed()/60);
    openSheet(`<div class="sheet-head"><h2>Set timer</h2><button class="x" onclick="App.openWorkoutEditor()">✕</button></div>
      <label class="field"><span class="lab">Minutes</span><input type="number" id="tm" value="${cur}"></label>
      <button class="btn block" onclick="App.saveTime()">Set</button>`); }
  function saveTime(){ const m=parseFloat($('#tm').value||0); const s=state.session; s.durationSec=Math.round(m*60); s.running=false; s.startedAt=Date.now()-s.durationSec*1000; saveSession(s); openWorkoutEditor(); }
  function setWorkoutDate(v){ state.session.workoutAt=new Date(v).toISOString(); saveSession(state.session); }
  function setWorkoutNotes(v){ state.session.notes=v; saveSession(state.session); }

  function pickExercise(){ openSheet(`<div class="sheet-head"><h2>Add exercise</h2><button class="x" onclick="App.openWorkoutEditor()">✕</button></div>
    <div class="list">${state.movements.map(m=>`<div class="item" onclick="App.addExercise('${m.id}')"><div class="grow"><div class="t">${esc(m.name)}</div><div class="s">${m.bandDoubled?'Doubled band':(m.resistanceType||'band')}</div></div><span class="link">Add</span></div>`).join('')||'<div class="muted">No movements. Add one under Movements.</div>'}</div>`); }
  function addExercise(mid){ const s=state.session; const e=newExercise(mid); e.rank=(s.exercises.length)+1; s.exercises.push(e); saveSession(s); editExercise(s.exercises.length-1); }

  let editIdx=-1;
  function editExercise(i){ editIdx=i; const s=state.session; const ex=s.exercises[i]; const mov=movById(ex.movementId);
    const prev=lastPerf(ex.movementId, s.id);
    const maxHist=Math.max(0,...state.workouts.flatMap(w=>(w.exercises||[]).filter(x=>x.movementId===ex.movementId).map(x=>x.reps||0)));
    openSheet(`
      <div class="sheet-head"><h2>Exercise</h2>
        <button class="iconbtn right" title="Per-exercise timer" onclick="App.exTimer()">⏱${ex.durationSec?' '+fmtDur(ex.durationSec):''}</button>
        <button class="x" onclick="App.openWorkoutEditor()">✕</button></div>
      <label class="field"><span class="lab">Movement</span>
        <select id="ex_mov" onchange="App.exSetMovement(this.value)">${state.movements.map(m=>`<option value="${m.id}" ${m.id===ex.movementId?'selected':''}>${esc(m.name)}</option>`).join('')}</select></label>
      <div class="row"><span class="lab" style="margin:0">Bands${mov&&mov.bandDoubled?' (Doubled)':''}</span><span class="link right" onclick="App.addBandToEx()">Add Another Band</span></div>
      <div id="ex_bands"></div>
      <div class="row" style="margin-top:14px"><span style="font-weight:700">Advanced</span>
        <label class="switch right"><input type="checkbox" id="ex_adv" ${ex.advanced?'checked':''} onchange="App.exToggleAdv(this.checked)"><span class="sl"></span></label></div>
      <div class="rep-grid" style="margin-top:10px">
        <div class="rep-box"><div class="cap">Full Repetitions</div>
          <input type="number" id="ex_reps" value="${ex.reps??''}" oninput="App.exSet('reps',this.value)">
          <div class="hint">${prev?`Prev: ${prev.reps??0}`:''}${maxHist?`   Max: ${maxHist}`:''}</div></div>
        <div class="rep-box" id="ex_partbox" style="${ex.advanced?'':'opacity:.4'}"><div class="cap">Partial Repetitions</div>
          <input type="number" id="ex_part" value="${ex.partialReps??''}" oninput="App.exSet('partialReps',this.value)" ${ex.advanced?'':'disabled'}>
          <div class="hint">${prev?`Prev: ${prev.partialReps??0}`:''}</div></div>
      </div>
      <label class="field"><span class="lab">Notes</span><textarea id="ex_notes" oninput="App.exSet('notes',this.value)">${esc(ex.notes||'')}</textarea></label>
      <div class="row" style="margin-top:10px"><button class="btn red" onclick="App.delExercise(${i})">Delete</button>
        <button class="btn right" onclick="App.openWorkoutEditor()">Save</button></div>`);
    renderExBands();
  }
  function curEx(){ return state.session.exercises[editIdx]; }
  function renderExBands(){ const ex=curEx(); const el=$('#ex_bands'); if(!el)return;
    el.innerHTML=(ex.bandIds||[]).map((id,bi)=>{ const b=bandById(id);
      return `<div class="band-pick"><span class="dot" style="background:${b?esc(b.color||'#888'):'#555'}"></span>
        <select class="grow" onchange="App.exSetBand(${bi},this.value)">${state.bands.map(bb=>`<option value="${bb.id}" ${bb.id===id?'selected':''}>${esc(bandLabel(bb))}</option>`).join('')}</select>
        <span class="iconbtn" style="width:34px;height:34px" onclick="App.exRemoveBand(${bi})">⊖</span></div>`; }).join('')
      || `<div class="band-pick"><span class="grow muted">No Band Selected</span><span class="link" onclick="App.addBandToEx()">Select</span></div>`;
  }
  function exSetMovement(v){ curEx().movementId=v; const mov=movById(v); saveSession(state.session); editExercise(editIdx); }
  function addBandToEx(){ const ex=curEx(); if(!state.bands.length){toast('Add a band first');return;} ex.bandIds=ex.bandIds||[]; ex.bandIds.push(state.bands[0].id); saveSession(state.session); renderExBands(); }
  function exSetBand(bi,v){ curEx().bandIds[bi]=v; saveSession(state.session); renderExBands(); }
  function exRemoveBand(bi){ curEx().bandIds.splice(bi,1); saveSession(state.session); renderExBands(); }
  function exToggleAdv(on){ curEx().advanced=on; saveSession(state.session); const box=$('#ex_partbox'),inp=$('#ex_part'); if(box)box.style.opacity=on?'1':'.4'; if(inp)inp.disabled=!on; }
  function exSet(f,v){ const ex=curEx(); if(f==='reps'||f==='partialReps') ex[f]= v===''?null:parseInt(v,10); else ex[f]=v||null; saveSession(state.session); }
  function exTimer(){ const ex=curEx(); const cur=ex.durationSec?Math.round(ex.durationSec/60):'';
    openSheet(`<div class="sheet-head"><h2>Exercise timer</h2><button class="x" onclick="App.editExercise(${editIdx})">✕</button></div>
      <label class="field"><span class="lab">Minutes (blank = none)</span><input type="number" id="extm" value="${cur}"></label>
      <button class="btn block" onclick="App.saveExTimer()">Set</button>`); }
  function saveExTimer(){ const v=$('#extm').value; curEx().durationSec= v===''?null:Math.round(parseFloat(v)*60); saveSession(state.session); editExercise(editIdx); }
  function delExercise(i){ state.session.exercises.splice(i,1); saveSession(state.session); openWorkoutEditor(); }

  function closeEditor(){ closeSheet(); }
  function deleteSession(){ const s=state.session; if(s.existing){ if(!confirm('Delete this workout?'))return; Supa.del('workouts',s.id).then(()=>{ state.workouts=state.workouts.filter(w=>w.id!==s.id); state.session=null; saveSession(null); closeSheet(); render(); toast('Deleted'); }); }
    else { if(!confirm('Discard this workout?'))return; state.session=null; saveSession(null); closeSheet(); } }
  async function finishSession(){ const s=state.session; const dur=sessionElapsed();
    const exercises=(s.exercises||[]).map((e,i)=>({ ...e, rank:i+1 }));
    const w={ id:s.id, date:new Date(s.workoutAt).toISOString(), durationSec:dur, notes:s.notes&&String(s.notes).trim()?s.notes.trim():null, autoSaved:false, restTimers:[], exercises, templateName:s.templateName||null };
    const btn=$('#saveSess'); if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
    try{ const saved=await Supa.put('workouts',w); saved.templateName=w.templateName; const i=state.workouts.findIndex(x=>x.id===saved.id); if(i>=0)state.workouts[i]=saved; else state.workouts.unshift(saved); state.workouts.sort((a,b)=>new Date(b.date)-new Date(a.date));
      state.session=null; saveSession(null); closeSheet(); go('workouts'); toast(s.existing?'Saved':'Workout saved · '+fmtDur(dur)); }
    catch(e){ toast('Error: '+(e.message||e)); if(btn){btn.disabled=false;btn.textContent='Save';} }
  }
  async function duplicateWorkout(id){ const w=state.workouts.find(x=>x.id===id); if(!w)return;
    startSession(); state.session.templateName=w.templateName||''; state.session.exercises=(w.exercises||[]).map((e,i)=>({...e,id:uuid(),reps:null,partialReps:null,durationSec:null,bandIds:(e.bandIds||[]).slice(),rank:i+1,notes:null})); saveSession(state.session); openWorkoutEditor(); }

  // ---------- ANALYTICS ----------
  function rangeBounds(){ const a=new Date(state.analytics.anchor); let start,end;
    if(state.analytics.range==='1W'){ start=new Date(a); start.setDate(a.getDate()-a.getDay()); end=new Date(start); end.setDate(start.getDate()+7); }
    else if(state.analytics.range==='1M'){ start=new Date(a.getFullYear(),a.getMonth(),1); end=new Date(a.getFullYear(),a.getMonth()+1,1); }
    else if(state.analytics.range==='3M'){ const q=Math.floor(a.getMonth()/3); start=new Date(a.getFullYear(),q*3,1); end=new Date(a.getFullYear(),q*3+3,1); }
    else { start=new Date(a.getFullYear(),0,1); end=new Date(a.getFullYear()+1,0,1); }
    return {start,end}; }
  function rangeLabel(){ const {start,end}=rangeBounds(); const e=new Date(end); e.setDate(e.getDate()-1); return `${MON[start.getMonth()]} ${start.getDate()}, ${start.getFullYear()} - ${MON[e.getMonth()]} ${e.getDate()}, ${e.getFullYear()}`; }
  function renderAnalytics(){
    const {start,end}=rangeBounds();
    const mid=state.analytics.movementId;
    let chartHtml='<div class="empty">Select a movement to see progression.</div>';
    if(mid){ const pts=[]; state.workouts.slice().reverse().forEach(w=>{ const t=new Date(w.date); if(t>=start&&t<end){ (w.exercises||[]).forEach(e=>{ if(e.movementId===mid){ pts.push({label:fmtShort(w.date), reps:(e.reps||0)+(e.partialReps||0), force:round(toDisp(bandMaxKg(e)))}); } }); } });
      chartHtml = pts.length? Charts.dualBar(pts,{aKey:'reps',bKey:'force',aColor:'#7aa2ff',bColor:'#9b8cff'})
        + `<div class="chart-legend"><span class="lg"><span class="sw" style="background:#7aa2ff"></span>Repetitions</span><span class="lg"><span class="sw" style="background:#9b8cff"></span>Max Force (${uName()})</span></div>`
        : '<div class="empty">No data in this range.</div>';
    }
    view().innerHTML=`
      <div class="page-head"><h1>Analytics</h1></div>
      <div class="seg" style="margin-bottom:12px">${['1W','1M','3M','1Y'].map(r=>`<button class="${state.analytics.range===r?'active':''}" onclick="App.anRange('${r}')">${r}</button>`).join('')}</div>
      <div class="row" style="justify-content:center;margin-bottom:14px"><button class="iconbtn" onclick="App.anMove(-1)">‹</button>
        <div style="min-width:230px;text-align:center;font-weight:600">${rangeLabel()}</div><button class="iconbtn" onclick="App.anMove(1)">›</button></div>
      <label class="field"><span class="lab">Movement</span>
        <select onchange="App.anMovement(this.value)"><option value="">- Select a Movement -</option>${state.movements.map(m=>`<option value="${m.id}" ${m.id===mid?'selected':''}>${esc(m.name)}</option>`).join('')}</select></label>
      <div class="card">${chartHtml}</div>`;
  }
  function anRange(r){ state.analytics.range=r; renderAnalytics(); }
  function anMove(dir){ const a=new Date(state.analytics.anchor); const R=state.analytics.range;
    if(R==='1W')a.setDate(a.getDate()+7*dir); else if(R==='1M')a.setMonth(a.getMonth()+dir); else if(R==='3M')a.setMonth(a.getMonth()+3*dir); else a.setFullYear(a.getFullYear()+dir);
    state.analytics.anchor=a; renderAnalytics(); }
  function anMovement(v){ state.analytics.movementId=v; renderAnalytics(); }

  // ---------- MANAGE: bands / movements / templates ----------
  function renderBands(){ view().innerHTML=`<div class="page-head"><h1>Bands</h1><button class="btn right" onclick="App.newBand()">+ Add</button></div>
    <div class="list">${state.bands.map(b=>`<div class="item"><span class="dot" style="background:${esc(b.color||'#888')}"></span><div class="grow"><div class="t">${esc(b.name)}</div><div class="s">${round(toDisp(b.minKg))}–${round(toDisp(b.maxKg))} ${uName()} · ${esc(b.brand||'')}</div></div><span class="iconbtn" onclick="App.editBand('${b.id}')">✎</span><span class="link danger" onclick="App.delItem('bands','${b.id}')">Delete</span></div>`).join('')||'<div class="empty">No bands</div>'}</div>`; }
  function bandForm(b){ b=b||{}; return `<label class="field"><span class="lab">Name</span><input id="b_name" value="${esc(b.name||'')}"></label>
    <label class="field"><span class="lab">Brand</span><input id="b_brand" value="${esc(b.brand||'')}"></label>
    <div class="grid two"><label class="field"><span class="lab">Min (${uName()})</span><input type="number" id="b_min" value="${b.minKg!=null?round(toDisp(b.minKg),1):''}"></label>
      <label class="field"><span class="lab">Max (${uName()})</span><input type="number" id="b_max" value="${b.maxKg!=null?round(toDisp(b.maxKg),1):''}"></label></div>
    <label class="field"><span class="lab">Color</span><input type="color" id="b_color" value="${esc(b.color||'#5fd0b5')}" style="height:44px"></label>`; }
  function newBand(){ openSheet(`<div class="sheet-head"><h2>New band</h2><button class="x" onclick="App.closeSheetX()">✕</button></div>${bandForm()}<button class="btn block" onclick="App.saveBand()">Add band</button>`); }
  function editBand(id){ const b=bandById(id); App._editBand=id; openSheet(`<div class="sheet-head"><h2>Edit band</h2><button class="x" onclick="App.closeSheetX()">✕</button></div>${bandForm(b)}<button class="btn block" onclick="App.saveBand('${id}')">Save</button>`); }
  async function saveBand(id){ const name=$('#b_name').value.trim(); if(!name){toast('Name?');return;} const f=state.units==='kg'?1:1/KG2LB;
    const b={ id:id||uuid(), name, brand:$('#b_brand').value.trim()||'Custom', color:$('#b_color').value, description:null, minKg:parseFloat($('#b_min').value||0)*f, maxKg:parseFloat($('#b_max').value||0)*f, key:'band:custom:'+name.toLowerCase().replace(/\s+/g,'-'), order:id?(bandById(id).order):state.bands.length };
    const saved=await Supa.put('bands',b); const i=state.bands.findIndex(x=>x.id===saved.id); if(i>=0)state.bands[i]=saved; else state.bands.push(saved); closeSheet(); render(); toast('Saved'); }

  function renderMovements(){ view().innerHTML=`<div class="page-head"><h1>Movements</h1><button class="btn right" onclick="App.newMovement()">+ Add</button></div>
    <div class="list">${state.movements.map(m=>`<div class="item"><div class="grow"><div class="t">${esc(m.name)}</div><div class="s">${m.bandDoubled?'Doubled · ':''}${m.trackReps?'reps ':''}${m.trackResistance?'· resistance':''}</div></div><span class="iconbtn" onclick="App.editMovement('${m.id}')">✎</span><span class="link danger" onclick="App.delItem('movements','${m.id}')">Delete</span></div>`).join('')||'<div class="empty">No movements</div>'}</div>`; }
  function movForm(m){ m=m||{}; return `<label class="field"><span class="lab">Name</span><input id="m_name" value="${esc(m.name||'')}"></label>
    <div class="row wrap"><label class="row" style="gap:8px"><input type="checkbox" id="m_dbl" style="width:auto" ${m.bandDoubled?'checked':''}> Doubled band</label>
    <label class="row" style="gap:8px"><input type="checkbox" id="m_adv" style="width:auto" ${m.trackPartialReps!==false?'checked':''}> Track partial reps</label></div>`; }
  function newMovement(){ openSheet(`<div class="sheet-head"><h2>New movement</h2><button class="x" onclick="App.closeSheetX()">✕</button></div>${movForm()}<button class="btn block" style="margin-top:10px" onclick="App.saveMovement()">Add</button>`); }
  function editMovement(id){ const m=movById(id); openSheet(`<div class="sheet-head"><h2>Edit movement</h2><button class="x" onclick="App.closeSheetX()">✕</button></div>${movForm(m)}<button class="btn block" style="margin-top:10px" onclick="App.saveMovement('${id}')">Save</button>`); }
  async function saveMovement(id){ const name=$('#m_name').value.trim(); if(!name){toast('Name?');return;} const ex=id?movById(id):{};
    const m={ id:id||uuid(), name, resistanceType:'band', bandDoubled:$('#m_dbl').checked, trackReps:true, trackPartialReps:$('#m_adv').checked, trackResistance:true, trackDuration:false, description:null, order:id?ex.order:state.movements.length };
    const saved=await Supa.put('movements',m); const i=state.movements.findIndex(x=>x.id===saved.id); if(i>=0)state.movements[i]=saved; else state.movements.push(saved); closeSheet(); render(); toast('Saved'); }

  function renderTemplates(){ view().innerHTML=`<div class="page-head"><h1>Templates</h1><button class="btn right" onclick="App.newTemplate()">+ Add</button></div>
    <div class="list">${state.templates.map(t=>`<div class="item"><div class="grow"><div class="t">${esc(t.name)}</div><div class="s">${(t.items||[]).length} movements · ${(t.items||[]).map(it=>movName(it.movementId)).slice(0,3).join(', ')}</div></div><span class="btn sm" onclick="App.startSession('${t.id}')">Start</span><span class="link danger" onclick="App.delItem('templates','${t.id}')">Delete</span></div>`).join('')||'<div class="empty">No templates</div>'}</div>`; }
  function newTemplate(){ App._tplSel=[]; openSheet(`<div class="sheet-head"><h2>New template</h2><button class="x" onclick="App.closeSheetX()">✕</button></div>
    <label class="field"><span class="lab">Name</span><input id="t_name"></label>
    <span class="lab">Movements (tap in order)</span><div class="pill-row" id="t_pick">${state.movements.map(m=>`<span class="chip" data-id="${m.id}" onclick="App.tplToggle(this)">${esc(m.name)}</span>`).join('')}</div>
    <button class="btn block" style="margin-top:12px" onclick="App.saveTemplate()">Create</button>`); }
  function tplToggle(el){ const id=el.dataset.id,i=App._tplSel.indexOf(id); if(i>=0){App._tplSel.splice(i,1);el.classList.remove('active');el.textContent=el.textContent.replace(/^\d+\.\s/,'');} else {App._tplSel.push(id);el.classList.add('active');el.textContent=App._tplSel.length+'. '+el.textContent;} }
  async function saveTemplate(){ const name=$('#t_name').value.trim(); if(!name||!App._tplSel.length){toast('Name + movements');return;}
    const t={ id:uuid(), name, items:App._tplSel.map((id,i)=>({movementId:id,rank:i+1,label:null,duration:null})) };
    const saved=await Supa.put('templates',t); state.templates.push(saved); closeSheet(); render(); toast('Created'); }
  async function delItem(store,id){ if(!confirm('Delete?'))return; await Supa.del(store,id); state[store]=state[store].filter(x=>x.id!==id); render(); toast('Deleted'); }
  function closeSheetX(){ closeSheet(); }

  // ---------- ACCOUNT / DATA ----------
  function account(){ menu(false); openSheet(`<div class="sheet-head"><h2>Account &amp; Data</h2><button class="x" onclick="App.closeSheetX()">✕</button></div>
    <p class="muted" style="font-size:13px;margin-top:-6px">${esc(state.user?.email||'')}</p>
    <div class="grid two" style="margin:10px 0"><div class="stat"><div class="n">${state.workouts.length}</div><div class="l">Workouts</div></div>
      <div class="stat"><div class="n">${state.workouts.reduce((a,w)=>a+(w.exercises||[]).length,0)}</div><div class="l">Exercises</div></div></div>
    <label class="field"><span class="lab">Units</span><select onchange="App.setUnits(this.value)"><option value="lb" ${state.units==='lb'?'selected':''}>Pounds (lb)</option><option value="kg" ${state.units==='kg'?'selected':''}>Kilograms (kg)</option></select></label>
    <button class="btn ghost block" onclick="App.pickHomePhoto()">Set home photo</button>
    <hr><h2 style="text-transform:none;color:var(--txt);font-size:15px">Import / Backup</h2>
    <div class="row" style="margin:8px 0"><label class="btn" style="cursor:pointer">Import V3ME file<input type="file" accept="application/json" style="display:none" id="impFile"></label>
      <button class="btn ghost" onclick="App.exportData()">Export</button></div>
    <p class="muted" style="font-size:12px">Import your <b>dt-haggist-x3-export.json</b> to load your full history (with exercises). Syncs to all your devices.</p>
    <hr><button class="btn ghost block" onclick="App.signOut()">Sign out</button>
    <button class="btn red block" style="margin-top:8px" onclick="App.eraseData()">Erase my data</button>`);
    $('#impFile').addEventListener('change', importFile);
  }
  async function setUnits(u){ state.units=u; await savePref('units',u); render(); toast('Units: '+u); }
  function exportData(){ const bundle={app:'DTHaggist-X3',schema:2,exportedAt:new Date().toISOString(),settings:{units:state.units},bands:state.bands,movements:state.movements,templates:state.templates,workouts:state.workouts};
    const blob=new Blob([JSON.stringify(bundle,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='dt-x3-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),3000); toast('Exported'); }
  async function importFile(e){ const f=e.target.files[0]; if(!f)return; let bundle; try{bundle=JSON.parse(await f.text());}catch(err){toast('Not valid JSON');return;}
    if(!bundle.workouts&&!bundle.bands){toast('Not a valid backup');return;}
    const replace=confirm('Replace your current data with this file?\n\nOK = Replace · Cancel = Merge');
    openSheet(`<div class="empty" style="padding:40px 10px"><span class="spin"></span><div class="muted" style="margin-top:12px">Importing ${(bundle.workouts||[]).length} workouts…</div></div>`);
    try{ const counts=await Supa.importBundle(bundle,{replace}); await refresh(); closeSheet(); render(); toast(`Imported ${Object.values(counts).reduce((a,b)=>a+b,0)} records`); }
    catch(err){ closeSheet(); toast('Import failed: '+(err.message||err)); }
  }
  async function signOut(){ closeSheet(); saveSession(null); await Supa.signOut(); }
  async function eraseData(){ if(!confirm('Erase ALL your data? Cannot be undone.'))return; try{ await Supa.importBundle({bands:[],movements:[],templates:[],workouts:[]},{replace:true}); await refresh(); closeSheet(); render(); toast('Erased'); }catch(e){toast('Error');} }

  // home photo
  function pickHomePhoto(){ openSheet(`<div class="sheet-head"><h2>Home photo</h2><button class="x" onclick="App.closeSheetX()">✕</button></div>
    <p class="muted" style="font-size:13px">Syncs to your other devices.</p>
    <label class="btn block" style="cursor:pointer">Choose photo<input type="file" accept="image/*" id="hp_in" style="display:none"></label>
    ${state.prefs.homePhoto?'<button class="btn ghost block" style="margin-top:8px" onclick="App.removeHomePhoto()">Remove photo</button>':''}`);
    $('#hp_in').addEventListener('change',onHomePhoto); }
  async function onHomePhoto(e){ const f=e.target.files[0]; if(!f)return; try{ const url=await downscale(f,1200,.78); state.prefs.homePhoto=url; closeSheet(); render(); toast('Saving photo…'); await Supa.setPref('homePhoto',url); toast('Home photo updated'); }catch(err){toast('Could not save image');} }
  async function removeHomePhoto(){ delete state.prefs.homePhoto; closeSheet(); render(); try{await Supa.setPref('homePhoto',null);}catch(e){} toast('Removed'); }
  function downscale(file,maxW,q){ return new Promise((res,rej)=>{ const img=new Image(); const u=URL.createObjectURL(file); img.onload=()=>{ const s=Math.min(1,maxW/img.width),w=Math.round(img.width*s),h=Math.round(img.height*s); const c=document.createElement('canvas'); c.width=w;c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); URL.revokeObjectURL(u); res(c.toDataURL('image/jpeg',q)); }; img.onerror=()=>{URL.revokeObjectURL(u);rej(new Error('bad'));}; img.src=u; }); }

  return { boot, showSetup:()=>showSetup(), saveSetup, authMode, authSubmit, forgot, menu, go, account,
    startSession, openWorkout, openWorkoutEditor, closeEditor, toggleTimer, editTime, saveTime, setWorkoutDate, setWorkoutNotes,
    pickExercise, addExercise, editExercise, exSetMovement, addBandToEx, exSetBand, exRemoveBand, exToggleAdv, exSet, exTimer, saveExTimer, delExercise,
    deleteSession, finishSession, duplicateWorkout,
    anRange, anMove, anMovement,
    newBand, editBand, saveBand, newMovement, editMovement, saveMovement, newTemplate, tplToggle, saveTemplate, delItem, closeSheetX,
    setUnits, exportData, signOut, eraseData, pickHomePhoto, removeHomePhoto, _tplSel:[] };
})();
window.addEventListener('DOMContentLoaded',()=>App.boot());

</script>
</body></html>
